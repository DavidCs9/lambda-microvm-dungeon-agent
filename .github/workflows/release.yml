name: Release MicroVM image

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  container:
    name: Build ARM64 container
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build without publishing
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: false

  verify:
    name: Verify release
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.22"
          python-version: "3.13"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --all-groups
      - name: Run quality gates
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy
          uv run pytest
          uv run python evals/gameplay_experience.py
      - name: Package deterministic source bundle
        run: uv run --group tooling python -m scripts.build_microvm_image --package-only
      - name: Upload verified source bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-source-${{ github.sha }}
          path: dist/microvm-source.zip
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to AWS
    needs: [container, verify]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.22"
          python-version: "3.13"
          enable-cache: true
      - name: Install release dependencies
        run: uv sync --locked --all-groups
      - name: Download verified source bundle
        uses: actions/download-artifact@v4
        with:
          name: release-source-${{ github.sha }}
          path: dist
      - name: Configure short-lived AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_RELEASE_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Build and publish MicroVM image version
        run: |
          uv run --group tooling python -m scripts.build_microvm_image \
            --region "${{ vars.AWS_REGION }}" \
            --stack-name "${{ vars.AWS_BOOTSTRAP_STACK }}" \
            --release-version "${GITHUB_REF_NAME}" \
            --output dist/microvm-source.zip \
            --use-existing-artifact \
            | tee dist/microvm-release.json
      - name: Add release summary
        run: |
          echo "## Lambda MicroVM image ${GITHUB_REF_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat dist/microvm-release.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" --clobber \
              dist/microvm-source.zip \
              dist/microvm-release.json
          else
            gh release create "${GITHUB_REF_NAME}" \
              --verify-tag \
              --generate-notes \
              dist/microvm-source.zip \
              dist/microvm-release.json
          fi
