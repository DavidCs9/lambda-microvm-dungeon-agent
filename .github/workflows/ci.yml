name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python 3.14
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.29"
          python-version: "3.14.6"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --all-groups
      - name: Run checks
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy
          uv run pytest
          uv run python evals/gameplay_experience.py

  container:
    name: Build ARM64 container
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.2.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0
      - name: Build without publishing
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          platforms: linux/arm64
          push: false

  package:
    name: Package release source
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.29"
          python-version: "3.14.6"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --all-groups
      - name: Build deterministic source bundle
        run: uv run --group tooling python -m scripts.build_microvm_image --package-only
      - name: Upload source bundle
        uses: actions/upload-artifact@v7.0.1
        with:
          name: microvm-source-${{ github.sha }}
          path: dist/microvm-source.zip
          if-no-files-found: error
          retention-days: 7
