name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.22"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --all-groups
      - name: Run checks
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy
          uv run pytest
          uv run python evals/gameplay_experience.py

  container:
    name: Build ARM64 container
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build without publishing
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: false

  package:
    name: Package release source
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.22"
          python-version: "3.13"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --all-groups
      - name: Build deterministic source bundle
        run: uv run --group tooling python -m scripts.build_microvm_image --package-only
      - name: Upload source bundle
        uses: actions/upload-artifact@v4
        with:
          name: microvm-source-${{ github.sha }}
          path: dist/microvm-source.zip
          if-no-files-found: error
          retention-days: 7
