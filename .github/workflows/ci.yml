name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      run_ci: ${{ steps.detect.outputs.run_ci }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Decide whether code CI is needed
        id: detect
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          # New branch / force-push with no useful before SHA: run full CI.
          if [[ -z "${base}" || "${base}" == "0000000000000000000000000000000000000000" ]]; then
            echo "run_ci=true" >> "$GITHUB_OUTPUT"
            echo "No usable base SHA; running full CI."
            exit 0
          fi

          mapfile -t files < <(git diff --name-only "${base}" "${head}")
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "run_ci=true" >> "$GITHUB_OUTPUT"
            echo "Empty diff; running full CI."
            exit 0
          fi

          non_md=()
          for path in "${files[@]}"; do
            if [[ "${path}" != *.md ]]; then
              non_md+=("${path}")
            fi
          done

          if [[ "${#non_md[@]}" -eq 0 ]]; then
            echo "run_ci=false" >> "$GITHUB_OUTPUT"
            echo "Markdown-only change; skipping heavy CI jobs."
            printf '%s\n' "${files[@]}"
          else
            echo "run_ci=true" >> "$GITHUB_OUTPUT"
            echo "Non-markdown files changed; running full CI."
            printf '%s\n' "${non_md[@]}"
          fi

  test:
    name: Python 3.14
    needs: changes
    if: needs.changes.outputs.run_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.29"
          python-version: "3.14.6"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --all-groups
      - name: Run checks
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy
          uv run pytest
          uv run python evals/gameplay_experience.py

  container:
    name: Build ARM64 container
    needs: changes
    if: needs.changes.outputs.run_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.2.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0
      - name: Build without publishing
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          platforms: linux/arm64
          push: false

  package:
    name: Package release source
    needs: changes
    if: needs.changes.outputs.run_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.29"
          python-version: "3.14.6"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --all-groups
      - name: Build deterministic source bundle
        run: uv run --group tooling python -m scripts.build_microvm_image --package-only
      - name: Upload source bundle
        uses: actions/upload-artifact@v7.0.1
        with:
          name: microvm-source-${{ github.sha }}
          path: dist/microvm-source.zip
          if-no-files-found: error
          retention-days: 7
