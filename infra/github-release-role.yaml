AWSTemplateFormatVersion: "2010-09-09"
Description: Least-privilege GitHub OIDC role for tagged Lambda MicroVM image releases.

Parameters:
  GitHubOidcProviderArn:
    Type: String
    AllowedPattern: ^arn:aws[a-z-]*:iam::[0-9]{12}:oidc-provider/token\.actions\.githubusercontent\.com$
    Description: ARN of the account-level GitHub Actions OIDC provider.
  ArtifactBucketName:
    Type: String
    MinLength: 3
    Description: Artifact bucket output from the MicroVM bootstrap stack.
  MicrovmBuildRoleArn:
    Type: String
    AllowedPattern: ^arn:aws[a-z-]*:iam::[0-9]{12}:role/.+$
    Description: Build role output from the MicroVM bootstrap stack.
  ImageName:
    Type: String
    Default: dungeon-agent-fastapi
    AllowedPattern: ^[a-zA-Z0-9-_]{1,64}$
  GitHubOwner:
    Type: String
    Default: DavidCs9
    AllowedPattern: ^[A-Za-z0-9-]+$
  GitHubOwnerId:
    Type: Number
    Default: 105255351
  GitHubRepository:
    Type: String
    Default: lambda-microvm-dungeon-agent
    AllowedPattern: ^[A-Za-z0-9_.-]+$
  GitHubRepositoryId:
    Type: Number
    Default: 1305119029
  GitHubEnvironment:
    Type: String
    Default: release
    AllowedPattern: ^[A-Za-z0-9_.-]+$

Resources:
  GitHubReleaseRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Publishes version-tagged dungeon agent Lambda MicroVM images from GitHub.
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Sub >-
                  repo:${GitHubOwner}@${GitHubOwnerId}/${GitHubRepository}@${GitHubRepositoryId}:environment:${GitHubEnvironment}
      Policies:
        - PolicyName: PublishTaggedMicrovmImage
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadBootstrapOutputs
                Effect: Allow
                Action: cloudformation:DescribeStacks
                Resource: "*"
              - Sid: UploadReleaseArtifact
                Effect: Allow
                Action: s3:PutObject
                Resource: !Sub "arn:${AWS::Partition}:s3:::${ArtifactBucketName}/artifacts/*"
              - Sid: CreateImage
                Effect: Allow
                Action: lambda:CreateMicrovmImage
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:RequestTag/Project: lambda-microvm-dungeon-agent
              - Sid: UpdateImageVersion
                Effect: Allow
                Action:
                  - lambda:GetMicrovmImage
                  - lambda:TagResource
                  - lambda:UpdateMicrovmImage
                Resource: !Sub >-
                  arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:microvm-image:${ImageName}
              - Sid: PassManagedInternetConnector
                Effect: Allow
                Action: lambda:PassNetworkConnector
                Resource: !Sub >-
                  arn:${AWS::Partition}:lambda:${AWS::Region}:aws:network-connector:aws-network-connector:INTERNET_EGRESS
              - Sid: PassMicrovmBuildRole
                Effect: Allow
                Action: iam:PassRole
                Resource: !Ref MicrovmBuildRoleArn

Outputs:
  GitHubReleaseRoleArn:
    Description: Configure this ARN as the GitHub release environment AWS_RELEASE_ROLE_ARN variable.
    Value: !GetAtt GitHubReleaseRole.Arn
